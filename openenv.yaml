name: triageflow
version: "1.0.0"
description: "A benchmark environment for AI-powered support ticket triage and routing"
author: "TriageFlow Team"
tags: ["triage", "support", "routing", "nlp", "operations"]
tasks:
  - name: ticket_classification
    description: "Classify ticket urgency and category"
    difficulty: easy
    max_steps: 10
  - name: ticket_routing
    description: "Classify, route, and request missing info"
    difficulty: medium
    max_steps: 20
  - name: policy_triage
    description: "Full policy-aware triage with escalation and SLA awareness"
    difficulty: hard
    max_steps: 30
observation_space:
  type: object
  fields:
    - ticket_id: string
    - subject: string
    - body: string
    - sender: string
    - timestamp: string
    - queue_depth: integer
    - current_step: integer
action_space:
  type: discrete_with_parameters
  actions: ["classify", "route", "request_info", "escalate", "resolve", "skip"]
reward:
  range: [-1.0, 1.0]
  type: dense
endpoints:
  reset: /reset
  step: /step
  state: /state
  health: /health
